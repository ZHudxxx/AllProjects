<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MathQuest — AlgebraBot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    
    <div class="logo">
      <img src="MathQuestLogo.png" alt="MathQuest Logo">
      <div>
        <div style="font-weight:700">MathQuest</div>
        <div style="font-size:12px;color:var(--muted)">Algebra Adventure</div>
      </div>
    </div>
    
    <div id="userGreeting" style="display:none;color:var(--muted);font-weight:600;"></div>
 
    <nav>
      <a href="index.html">Home</a>
      <a href="learn.html" class="active">Learn</a>
      <a href="quiz.html">Quiz</a>
      <a href="profile.html">Profile</a>
    </nav>
  </header>

  <main>
    <div class="card">
      <h2>AlgebraBot Assistant</h2>
      <p>Ask me anything about algebra! Type <code>solve 2x+4=10</code> or <code>hint</code> to get started.</p>
      <div class="chat-window" style="position:static;width:100%;max-width:600px;">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input">
          <input id="chatInput" type="text" placeholder="Ask AlgebraBot..." />
          <button class="small" id="sendChat">Send</button>
        </div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
