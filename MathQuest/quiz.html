<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MathQuest — Algebra Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    
    <div class="logo">
      <img src="MathQuestLogo.png" alt="MathQuest Logo">
      <div>
        <div style="font-weight:700">MathQuest</div>
        <div style="font-size:12px;color:var(--muted)">Algebra Adventure</div>
      </div>
    </div>
    
    <div id="userGreeting" style="display:none;color:var(--muted);font-weight:600;"></div>
 
    <!-- Back Button Added -->
    <button onclick="history.back()" style="padding:6px 12px;border-radius:6px;border:none;background:#444;color:white;cursor:pointer;">← Back</button>

  </header>

  <main>
    <div class="card">
      <h2>Algebra Quiz Challenge</h2>
      <div class="question" id="questionArea">
        <div id="questionText">Click “Start Quiz” to begin.</div>
        <div class="choices" id="choicesArea"></div>
      </div>
      <div style="margin-top:12px;display:flex;justify-content:space-between;">
        <button class="small" id="startAdventure">Start Quiz</button>
        <button class="small" id="nextQuestion" style="display:none">Next</button>
      </div>
      <div style="margin-top:10px;color:var(--muted)">Score: <span id="quizScore">0</span></div>
    </div>
  </main>
  
    <!-- CHATBOT -->
  <div class="chat-float">
    <div class="chat-button" id="chatToggle">AI</div>
  </div>

  <div id="chatWindow" class="chat-window">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <div style="font-weight:800">AlgebraBot</div>
      <div style="color:var(--muted);font-size:13px">Type “solve” or “hint”</div>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input">
      <input id="chatInput" type="text" placeholder="Ask AlgebraBot: e.g. solve 2x+4=10">
      <button class="small" id="sendChat">Send</button>
    </div>
  </div>
  
  <script>
  // CHATBOT LOGIC
    const chatToggle = document.getElementById('chatToggle');
    const chatWindow = document.getElementById('chatWindow');
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');

    chatToggle.addEventListener('click', () => {
      chatWindow.style.display = chatWindow.style.display === 'none' ? 'block' : 'none';
    });

    document.getElementById('sendChat').addEventListener('click', sendChat);
    chatInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendChat(); });

    function sendChat() {
      const text = chatInput.value.trim();
      if (!text) return;
      pushChat(text, 'user');
      chatInput.value = '';
      setTimeout(() => handleBot(text), 400);
    }

    function pushChat(msg, from='bot') {
      const div = document.createElement('div');
      div.className = 'bubble ' + (from === 'bot' ? 'bot' : 'user');
      div.innerHTML = msg;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function handleBot(text) {
      const t = text.toLowerCase();
      if (t.startsWith('solve')) {
        pushChat('Try isolating x: ' + t.split('solve')[1]);
      } else if (t.includes('hint')) {
        pushChat('Hint: move constants to the opposite side, then divide.');
      } else {
        pushChat('I can help with algebra — try typing "solve 2x+4=10".');
      }
    }

    setTimeout(() => pushChat("Hi! I'm AlgebraBot — try typing 'solve 2x+4=10'."), 800);
	</script>

  <script src="script.js"></script>
</body>
</html>
